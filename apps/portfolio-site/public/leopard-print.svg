<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <pattern id="leopard" patternUnits="userSpaceOnUse" width="200" height="200">
      <!-- Base golden/tan background -->
      <rect width="200" height="200" fill="#D4A574"/>
      
      <!-- Leopard spots - irregular black shapes with brown centers -->
      <!-- Row 1 -->
      <ellipse cx="25" cy="20" rx="15" ry="10" fill="#2C1810" transform="rotate(-15 25 20)"/>
      <ellipse cx="25" cy="20" rx="8" ry="5" fill="#8B6914" transform="rotate(-15 25 20)"/>
      
      <ellipse cx="80" cy="15" rx="12" ry="8" fill="#2C1810" transform="rotate(20 80 15)"/>
      <ellipse cx="80" cy="15" rx="6" ry="4" fill="#8B6914" transform="rotate(20 80 15)"/>
      
      <ellipse cx="140" cy="25" rx="18" ry="12" fill="#2C1810" transform="rotate(-10 140 25)"/>
      <ellipse cx="140" cy="25" rx="10" ry="6" fill="#8B6914" transform="rotate(-10 140 25)"/>
      
      <ellipse cx="185" cy="10" rx="14" ry="9" fill="#2C1810" transform="rotate(25 185 10)"/>
      <ellipse cx="185" cy="10" rx="7" ry="4" fill="#8B6914" transform="rotate(25 185 10)"/>
      
      <!-- Row 2 -->
      <ellipse cx="10" cy="60" rx="16" ry="11" fill="#2C1810" transform="rotate(30 10 60)"/>
      <ellipse cx="10" cy="60" rx="9" ry="5" fill="#8B6914" transform="rotate(30 10 60)"/>
      
      <ellipse cx="55" cy="55" rx="13" ry="9" fill="#2C1810" transform="rotate(-25 55 55)"/>
      <ellipse cx="55" cy="55" rx="7" ry="4" fill="#8B6914" transform="rotate(-25 55 55)"/>
      
      <ellipse cx="110" cy="65" rx="17" ry="11" fill="#2C1810" transform="rotate(15 110 65)"/>
      <ellipse cx="110" cy="65" rx="9" ry="5" fill="#8B6914" transform="rotate(15 110 65)"/>
      
      <ellipse cx="165" cy="50" rx="14" ry="10" fill="#2C1810" transform="rotate(-20 165 50)"/>
      <ellipse cx="165" cy="50" rx="8" ry="5" fill="#8B6914" transform="rotate(-20 165 50)"/>
      
      <!-- Row 3 -->
      <ellipse cx="35" cy="100" rx="15" ry="10" fill="#2C1810" transform="rotate(10 35 100)"/>
      <ellipse cx="35" cy="100" rx="8" ry="5" fill="#8B6914" transform="rotate(10 35 100)"/>
      
      <ellipse cx="90" cy="95" rx="12" ry="8" fill="#2C1810" transform="rotate(-30 90 95)"/>
      <ellipse cx="90" cy="95" rx="6" ry="4" fill="#8B6914" transform="rotate(-30 90 95)"/>
      
      <ellipse cx="145" cy="105" rx="16" ry="11" fill="#2C1810" transform="rotate(5 145 105)"/>
      <ellipse cx="145" cy="105" rx="9" ry="6" fill="#8B6914" transform="rotate(5 145 105)"/>
      
      <ellipse cx="190" cy="90" rx="13" ry="9" fill="#2C1810" transform="rotate(-15 190 90)"/>
      <ellipse cx="190" cy="90" rx="7" ry="4" fill="#8B6914" transform="rotate(-15 190 90)"/>
      
      <!-- Row 4 -->
      <ellipse cx="15" cy="140" rx="14" ry="9" fill="#2C1810" transform="rotate(-5 15 140)"/>
      <ellipse cx="15" cy="140" rx="7" ry="4" fill="#8B6914" transform="rotate(-5 15 140)"/>
      
      <ellipse cx="65" cy="145" rx="16" ry="10" fill="#2C1810" transform="rotate(25 65 145)"/>
      <ellipse cx="65" cy="145" rx="9" ry="5" fill="#8B6914" transform="rotate(25 65 145)"/>
      
      <ellipse cx="120" cy="135" rx="13" ry="8" fill="#2C1810" transform="rotate(-20 120 135)"/>
      <ellipse cx="120" cy="135" rx="7" ry="4" fill="#8B6914" transform="rotate(-20 120 135)"/>
      
      <ellipse cx="175" cy="145" rx="15" ry="10" fill="#2C1810" transform="rotate(15 175 145)"/>
      <ellipse cx="175" cy="145" rx="8" ry="5" fill="#8B6914" transform="rotate(15 175 145)"/>
      
      <!-- Row 5 -->
      <ellipse cx="45" cy="180" rx="12" ry="8" fill="#2C1810" transform="rotate(10 45 180)"/>
      <ellipse cx="45" cy="180" rx="6" ry="4" fill="#8B6914" transform="rotate(10 45 180)"/>
      
      <ellipse cx="100" cy="175" rx="15" ry="10" fill="#2C1810" transform="rotate(-15 100 175)"/>
      <ellipse cx="100" cy="175" rx="8" ry="5" fill="#8B6914" transform="rotate(-15 100 175)"/>
      
      <ellipse cx="155" cy="185" rx="14" ry="9" fill="#2C1810" transform="rotate(20 155 185)"/>
      <ellipse cx="155" cy="185" rx="7" ry="4" fill="#8B6914" transform="rotate(20 155 185)"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#leopard)"/>
</svg>
