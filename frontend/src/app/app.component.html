<div class="container mat-typography">
  
  <nav class="main-nav glass-panel" style="margin-bottom: 2rem; padding: 1rem; display: flex; justify-content: space-between; align-items: center;">
    <div class="brand" style="display: flex; align-items: center; gap: 0.5rem;">
        <div class="profile-slot">
            <!-- Profile Picture Slot -->
            <img src="assets/profile-placeholder.png" alt="Profile" class="profile-pic" onerror="this.src='assets/default-avatar.png';">
        </div>
        <span style="font-weight: bold; font-size: 1.2rem; font-family: monospace;">VR.VUNDLA_5.0</span>
        <span class="status-dot pulsing"></span>
    </div>
    <div class="nav-links">
        <a mat-button routerLink="/" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact: true}" class="nav-item">
            <mat-icon>terminal</mat-icon> <span class="nav-label">SYSTEM_ROOT</span>
        </a>
        <a mat-button routerLink="/certifications" routerLinkActive="active-link" class="nav-item">
            <mat-icon>verified</mat-icon> <span class="nav-label">CERTIFICATES</span>
        </a>
        <a mat-button routerLink="/projects" routerLinkActive="active-link" class="nav-item">
            <mat-icon>architecture</mat-icon> <span class="nav-label">PROJECTS_AI</span>
        </a>
        <a mat-button routerLink="/resume" routerLinkActive="active-link" class="nav-item">
            <mat-icon>description</mat-icon> <span class="nav-label">RESUME_CV</span>
        </a>
    </div>
  </nav>

  <!-- Main Content Area -->
  <main class="router-container" style="min-height: 60vh;">
    <router-outlet></router-outlet>
  </main>

  <footer style="margin-top: 4rem; text-align: center; color: rgba(255,255,255,0.3); font-size: 0.8rem;">
    <p>System Architecture v5.0 // Angular + .NET 8 + Pony // Fault Tolerance Active</p>
  </footer>

</div>
